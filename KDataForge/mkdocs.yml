site_name: KDataForge
site_description: YAML-driven runtime content editing framework for Satisfactory
site_author: Kyri123/Kyrium
repo_url: https://github.com/Kyri123
docs_dir: Docs
site_dir: Saved/DocsSite # build output — never committed (Saved/ is ignored)

theme:
  name: material
  palette:
    # FICSIT: orange accents on dark panels
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Overview: index.md
  - Architecture: 1.architecture.md
  - YAML Schema: 2.yaml-schema.md
  - Module Structure: 3.module-structure.md
  - Handler Template: 6.handler-template.md
  - UE Editor Integration: 11.editor-integration.md
  - API Design: 8.api-design.md
  - Examples:
      - Overview: 10.examples/index.md
      - Getting Started: 10.examples/1.getting-started.md
      - Property Types: 10.examples/2.property-types.md
      - Operations: 10.examples/3.operations.md
      - Targeting: 10.examples/4.targeting.md
      - Conditions & Packs: 10.examples/5.conditions-and-packs.md
      - Document Types:
          - "Type: cdo": 10.examples/11.cdo.md
          - "Type: gametag": 10.examples/12.gametag.md
          - "Type: localization": 10.examples/13.localization.md
          - "Type: item": 10.examples/14.item.md
          - "Type: resource": 10.examples/15.resource.md
          - "Type: building": 10.examples/16.building.md
          - "Type: unlock": 10.examples/17.unlock.md
          - "Type: recipe": 10.examples/18.recipe.md
          - "Type: schematic": 10.examples/19.schematic.md
          - "Type: research / mam": 10.examples/20.research.md
          - "Type: sinkpoints": 10.examples/21.sinkpoints.md
          - "Type: class": 10.examples/23.custom-classes.md
          - Data Assets: 10.examples/10.data-assets.md
      - Balancing: 10.examples/6.balancing.md
      - Buildings: 10.examples/7.buildings.md
      - A Complete Building: 10.examples/24.building-chain.md
