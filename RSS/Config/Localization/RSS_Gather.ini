;METADATA=(Diff=true, UseCommands=true)
[CommonSettings]
ModulesToPreload=RSS
SourcePath=Mods/RSS/Content/Localization/RSS
DestinationPath=Mods/RSS/Content/Localization/RSS
ManifestName=RSS.manifest
ArchiveName=RSS.archive
NativeCulture=en
CulturesToGenerate=en
CulturesToGenerate=de-DE

[GatherTextStep0]
CommandletClass=GatherTextFromSource
SearchDirectoryPaths=%LOCPROJECTROOT%Mods/RSS/Source
SearchDirectoryPaths=%LOCPROJECTROOT%Mods/RSS/Config
ExcludePathFilters=Config/Localization/*
FileNameFilters=*.h
FileNameFilters=*.cpp
FileNameFilters=*.ini
ShouldGatherFromEditorOnlyData=false

[GatherTextStep1]
CommandletClass=GatherTextFromAssets
IncludePathFilters=%LOCPROJECTROOT%Mods/RSS/Content/*
ExcludePathFilters=Content/Localization/*
ExcludePathFilters=Content/L10N/*
PackageFileNameFilters=*.umap
PackageFileNameFilters=*.uasset
ExcludeClasses=/Script/Engine.MaterialInstance
ExcludeClasses=/Script/Engine.Material
ExcludeClasses=/Script/Engine.StaticMesh
ExcludeClasses=/Script/Engine.SkeletalMesh
ExcludeClasses=/Script/Engine.Texture
ExcludeClasses=/Script/Engine.MaterialFunction
ShouldExcludeDerivedClasses=true
ShouldGatherFromEditorOnlyData=false
SkipGatherCache=false

[GatherTextStep2]
CommandletClass=GenerateGatherManifest

[GatherTextStep3]
CommandletClass=GenerateGatherArchive

[GatherTextStep4]
CommandletClass=GenerateTextLocalizationReport
bWordCountReport=true
WordCountReportName=RSS.csv
bConflictReport=true
ConflictReportName=RSS_Conflicts.txt

