[Internationalization]
LocalizationPaths = ../../../FactoryGame/Mods/KBFL/Localization/KBFL

[/Script/Engine.AssetManagerSettings]
; Force KBFL PrimaryDataAssets (CDO overwrites, customization providers, resource-node and
; sub-level spawn descriptors) into the cook. These are discovered only at runtime via the asset
; registry, so without an AlwaysCook scan rule they are culled from the shipped package — which
; silently breaks CDO content overrides and node spawning. Mirrors RefinedRDApi.
; CDO/customization classes are UCLASS() (non-Blueprintable) -> assets are data-asset instances
; (bHasBlueprintClasses=False). The Blueprintable descriptor bases get both instance and BP rules.
+PrimaryAssetTypesToScan=(PrimaryAssetType="KBFLCDOOverwrite",AssetBaseClass="/Script/KBFL.KBFLCDOOverwriteBase",bHasBlueprintClasses=False,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))
+PrimaryAssetTypesToScan=(PrimaryAssetType="KBFLCustomizationProvider",AssetBaseClass="/Script/KBFL.KBFLCustomizationProvider",bHasBlueprintClasses=False,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))
+PrimaryAssetTypesToScan=(PrimaryAssetType="KBFLActorSpawnDescriptor",AssetBaseClass="/Script/KBFL.KBFLActorSpawnDescriptorBase",bHasBlueprintClasses=False,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))
+PrimaryAssetTypesToScan=(PrimaryAssetType="KBFLActorSpawnDescriptorBP",AssetBaseClass="/Script/KBFL.KBFLActorSpawnDescriptorBase",bHasBlueprintClasses=True,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))
+PrimaryAssetTypesToScan=(PrimaryAssetType="KBFLSubLevelSpawning",AssetBaseClass="/Script/KBFL.KBFLSubLevelSpawning",bHasBlueprintClasses=False,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))
+PrimaryAssetTypesToScan=(PrimaryAssetType="KBFLSubLevelSpawningBP",AssetBaseClass="/Script/KBFL.KBFLSubLevelSpawning",bHasBlueprintClasses=True,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))

[ConsoleVariables]
; Crash fix: the base-game rain Niagara system (emitter "ImpactPointsAtSphere") loads with its
; Emitter[0] dependency stripped by the cook, so rendering it requests a GPU sort against a null
; buffer and hard-crashes in FGPUSortManager::FDynamicValueBuffer::Allocate (EXCEPTION_ACCESS_VIOLATION
; reading 0x28). Most common on low-end / integrated GPUs. Disabling GPU particle sorting skips the
; AddSortedGPUSimulation path entirely; GPU particles still render, only their translucency sort order
; is no longer GPU-computed (negligible visual impact). Also covers any GPU Cascade sprite emitter.
FX.AllowGPUSorting=0