[Internationalization]
LocalizationPaths = ../../../FactoryGame/Mods/KUI/Localization/KUI

[/Script/Engine.AssetManagerSettings]
; Force all KAPIDataAsset PrimaryDataAssets (and their referenced icon textures) into the cook.
; Without this rule the assets are only discovered at runtime via the asset registry and get
; culled from the shipped package because nothing hard-references them. Mirrors RefinedRDApi.
+PrimaryAssetTypesToScan=(PrimaryAssetType="KAPIDataAsset",AssetBaseClass="/Script/KAPI.KAPIDataAssetBase",bHasBlueprintClasses=True,bIsEditorOnly=False,Directories=((Path="/")),SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))